<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image — BAYYZ TOOLS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-badge">BY</span>
        <span class="logo-name">BAYYZ<span>TOOLS</span></span>
      </a>
      <a href="index.html" class="header-back">← Home</a>
    </div>
  </header>

  <main class="main">
    <div class="page-hero fade-in">
      <div class="page-hero-tag">🎨 AI Image</div>
      <h1>Transform foto jadi <span class="grad">AI art</span><br/>dalam detik.</h1>
      <p>Pilih style, upload foto — selesai.</p>
    </div>

    <div class="fade-in">
      <div class="style-grid">
        <button class="style-btn active" onclick="selectStyle(this,'anime')">🌸 Anime</button>
        <button class="style-btn" onclick="selectStyle(this,'chibi')">🐣 Chibi</button>
        <button class="style-btn" onclick="selectStyle(this,'figura')">🗿 Figura</button>
        <button class="style-btn" onclick="selectStyle(this,'blonde')">👱 Blonde</button>
        <button class="style-btn" onclick="selectStyle(this,'hitam')">🖤 Hitam</button>
        <button class="style-btn" onclick="selectStyle(this,'putih')">🤍 Putih</button>
      </div>

      <div class="figura-ver" id="figura-ver" style="display:none">
        <span class="ver-label">Versi Figura:</span>
        <button class="ver-btn active" onclick="selectFiguraVer(this,'v1')">V1</button>
        <button class="ver-btn" onclick="selectFiguraVer(this,'v2')">V2</button>
        <button class="ver-btn" onclick="selectFiguraVer(this,'v3')">V3</button>
      </div>

      <div class="upload-area" onclick="document.getElementById('ai-file').click()">
        <span id="ai-label">📁 Tap untuk pilih gambar</span>
        <input type="file" id="ai-file" accept="image/*" style="display:none"
          onchange="onFileSelected(this,'ai-label'); transformImage(this)" />
      </div>
      <div class="result" id="ai-result"></div>
    </div>
  </main>

  <footer class="footer">
    <p>BAYYZ TOOLS · by <a href="https://t.me/bayyzofc1" target="_blank">@bayyzofc1</a></p>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
